- id: energy_tariff_day_start
  alias: "Енергія | 07:00 — старт денного тарифу"
  trigger:
    - platform: time
      at: "07:00:00"
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.energy_today_night
      data:
        value: >
          {% set total = states('sensor.rele_naprug_total_energy_2') | float(0) %}
          {% set start = states('input_number.energy_night_start') | float(0) %}
          {{ [total - start, 0] | max | round(3) }}
    - service: input_number.set_value
      target:
        entity_id: input_number.energy_month_night
      data:
        value: >
          {% set total = states('sensor.rele_naprug_total_energy_2') | float(0) %}
          {% set start = states('input_number.energy_night_start') | float(0) %}
          {% set night_now = [total - start, 0] | max | round(3) %}
          {{ (states('input_number.energy_month_night') | float(0) + night_now) | round(3) }}
    - service: input_number.set_value
      target:
        entity_id: input_number.energy_day_start
      data:
        value: "{{ states('sensor.rele_naprug_total_energy_2') | float(0) }}"

- id: energy_tariff_night_start
  alias: "Енергія | 23:00 — старт нічного тарифу"
  trigger:
    - platform: time
      at: "23:00:00"
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.energy_today_day
      data:
        value: >
          {% set total = states('sensor.rele_naprug_total_energy_2') | float(0) %}
          {% set start = states('input_number.energy_day_start') | float(0) %}
          {{ [total - start, 0] | max | round(3) }}
    - service: input_number.set_value
      target:
        entity_id: input_number.energy_month_day
      data:
        value: >
          {% set total = states('sensor.rele_naprug_total_energy_2') | float(0) %}
          {% set start = states('input_number.energy_day_start') | float(0) %}
          {% set day_now = [total - start, 0] | max | round(3) %}
          {{ (states('input_number.energy_month_day') | float(0) + day_now) | round(3) }}
    - service: input_number.set_value
      target:
        entity_id: input_number.energy_night_start
      data:
        value: "{{ states('sensor.rele_naprug_total_energy_2') | float(0) }}"

- id: energy_daily_report_midnight
  alias: "Енергія | 00:00 — щоденний звіт"
  trigger:
    - platform: time
      at: "00:00:00"
  action:
    - delay: "00:00:02"
    - service: notify.send_message
      target:
        entity_id: notify.telegram_bot_7879913057_254266061
      data:
        message: >
          ⚡ *Щоденний звіт енергії*
          📅 {{ (now() - timedelta(days=1)).strftime('%d.%m.%Y') }}

          ☀️ День: *{{ states('input_number.energy_today_day') | float(0) | round(3) }} кВт·год*
          🌙 Ніч: *{{ states('input_number.energy_today_night') | float(0) | round(3) }} кВт·год*
          📊 Всього: *{{ (states('input_number.energy_today_day') | float(0) + states('input_number.energy_today_night') | float(0)) | round(3) }} кВт·год*
    - service: input_number.set_value
      target:
        entity_id: input_number.energy_today_day
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.energy_today_night
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.energy_night_start
      data:
        value: "{{ states('sensor.rele_naprug_total_energy_2') | float(0) }}"
    - condition: template
      value_template: "{{ (now() + timedelta(days=1)).day == 1 }}"
    - service: notify.send_message
      target:
        entity_id: notify.telegram_bot_7879913057_254266061
      data:
        message: >
          📋 *Місячний звіт*
          🗓 {{ (now() - timedelta(days=1)).strftime('%B %Y') }}

          ☀️ День (07–23): *{{ states('input_number.energy_month_day') | float(0) | round(3) }} кВт·год*
          🌙 Ніч (23–07): *{{ states('input_number.energy_month_night') | float(0) | round(3) }} кВт·год*
          ━━━━━━━━━━━━━━
          📊 Всього за місяць: *{{ (states('input_number.energy_month_day') | float(0) + states('input_number.energy_month_night') | float(0)) | round(3) }} кВт·год*
    - service: input_number.set_value
      target:
        entity_id: input_number.energy_month_day
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.energy_month_night
      data:
        value: 0