      {% if 'disk' in tid %}
        {{ tid.split('_')[1] }}
      {% else %}
        unknown
      {% endif %}

    event_type: >
      {% if trigger.id.startswith('temp_') %}
        temperature
      {% else %}
        health
      {% endif %}

    current_temp: >
      {% if event_type == 'temperature' %}
        {{ trigger.to_state.state }}
      {% else %}
        {{ states('sensor.bignas_disk_' ~ disk_id ~ '_temperature') }}
      {% endif %}

    d_name: "{{ disk_info[disk_id]['name'] if disk_id in disk_info else disk_id }}"
    d_model: "{{ disk_info[disk_id]['model'] if disk_id in disk_info else 'Невідомо' }}"
